<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>شاشة تفاعلية - دوائر وخطوط</title>
    <link rel="icon" type="image/png" href="/images/circles-lines.jpg">
    <link rel="manifest" href="/manifest.json">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            min-height: 100vh;
            background: #0b0b0b;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: none;
            padding: 0;
            overflow: hidden;
        }

        .canvas-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: #0b0b0b;
            touch-action: none;
            cursor: crosshair;
            overflow: hidden;
        }

        /* طبقة الرسم الرئيسية (canvas) */
        #drawCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
            background: #0b0b0b;
            touch-action: none;
            pointer-events: auto;
        }

        /* عناصر الدوائر والخطوط تظهر فوق canvas */
        .interaction-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        .circle-fade {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            animation: fadeOut 0.9s ease-out forwards;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 20px rgba(255,255,255,0.2);
        }

        @keyframes fadeOut {
            0% { opacity: 0.95; transform: translate(-50%, -50%) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(1.3); }
        }

        /* خطوط السحب العريضة (تظهر كعناصر div) */
        .draw-line {
            position: absolute;
            height: 18px;
            border-radius: 20px;
            pointer-events: none;
            transform-origin: 0 50%;
            box-shadow: 0 0 15px rgba(255,255,255,0.3);
            transition: none;
            will-change: transform, width, left, top;
        }

        /* رسالة إرشادية بسيطة تختفي بعد ثوان */
        .hint {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            color: #888;
            background: rgba(20,20,20,0.7);
            padding: 10px 24px;
            border-radius: 60px;
            font-size: 0.9rem;
            backdrop-filter: blur(6px);
            border: 1px solid #333;
            pointer-events: none;
            z-index: 20;
            white-space: nowrap;
            font-weight: 400;
            letter-spacing: 0.5px;
            transition: opacity 0.8s;
        }

        @media (max-width: 700px) {
            .hint {
                font-size: 0.7rem;
                padding: 6px 16px;
                bottom: 20px;
            }
            .draw-line {
                height: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="canvas-container" id="canvasContainer">
        <!-- Canvas حقيقي لالتقاط الأحداث (معتم) -->
        <canvas id="drawCanvas"></canvas>

        <!-- طبقة التفاعل (تظهر عليها الدوائر والخطوط) -->
        <div class="interaction-layer" id="interactionLayer"></div>

        <!-- رسالة توجيهية -->
        <div class="hint" id="hintMessage">👆 اضغط أو اسحب بأصبعك لرسم دوائر وخطوط عريضة</div>
    </div>

    <script>
        (function() {
            const container = document.getElementById('canvasContainer');
            const canvas = document.getElementById('drawCanvas');
            const ctx = canvas.getContext('2d');
            const interactionLayer = document.getElementById('interactionLayer');
            const hint = document.getElementById('hintMessage');

            // ضبط حجم canvas لملء الشاشة
            function resizeCanvas() {
                const rect = container.getBoundingClientRect();
                canvas.width = rect.width;
                canvas.height = rect.height;
                ctx.fillStyle = '#0b0b0b';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }
            resizeCanvas();
            window.addEventListener('resize', () => {
                resizeCanvas();
                ctx.fillStyle = '#0b0b0b';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            });

            // متغيرات التتبع
            let isPointerDown = false;
            let lastX = 0, lastY = 0;
            let currentLineElement = null;    // عنصر الخط الحالي (div)
            let lineStartX = 0, lineStartY = 0;

            // دوال مساعدة للألوان العشوائية الزاهية
            function getRandomVibrantColor() {
                const hue = Math.floor(Math.random() * 360);
                return `hsl(${hue}, 85%, 60%)`;
            }

            function getRandomColorWithAlpha(alpha = 0.85) {
                const hue = Math.floor(Math.random() * 360);
                return `hsla(${hue}, 90%, 65%, ${alpha})`;
            }

            // حذف جميع الخطوط الموجودة (تُستدعى قبل بدء خط جديد)
            function clearAllLines() {
                const lines = interactionLayer.querySelectorAll('.draw-line');
                lines.forEach(el => el.remove());
            }

            // إنشاء دائرة في نقطة معينة بلون عشوائي
            function createCircle(clientX, clientY) {
                const rect = container.getBoundingClientRect();
                const x = clientX - rect.left;
                const y = clientY - rect.top;

                const size = 40 + Math.random() * 80;
                const color = getRandomColorWithAlpha(0.9);

                const circle = document.createElement('div');
                circle.className = 'circle-fade';
                circle.style.width = size + 'px';
                circle.style.height = size + 'px';
                circle.style.left = x + 'px';
                circle.style.top = y + 'px';
                circle.style.background = `radial-gradient(circle at 30% 30%, ${color}, ${color}dd, ${color}88)`;
                circle.style.boxShadow = `0 0 30px ${color}`;

                interactionLayer.appendChild(circle);

                setTimeout(() => {
                    if (circle.parentNode) circle.remove();
                }, 1000);
            }

            // بدء خط جديد (عند الضغط) — مع مسح جميع الخطوط السابقة
            function startLine(clientX, clientY) {
                // 🔥 إزالة جميع الخطوط القديمة قبل رسم الخط الجديد
                clearAllLines();

                // إنهاء أي خط سابق (آمن)
                if (currentLineElement) {
                    currentLineElement.remove();
                    currentLineElement = null;
                }

                const rect = container.getBoundingClientRect();
                const x = clientX - rect.left;
                const y = clientY - rect.top;

                lastX = x;
                lastY = y;
                lineStartX = x;
                lineStartY = y;

                const line = document.createElement('div');
                line.className = 'draw-line';
                const color = getRandomVibrantColor();
                line.style.background = `linear-gradient(90deg, ${color}, ${color}dd)`;
                line.style.boxShadow = `0 0 20px ${color}`;

                line.style.left = x + 'px';
                line.style.top = y + 'px';
                line.style.width = '0px';
                line.style.height = '18px';  // سمك عريض
                line.style.transform = 'rotate(0deg)';

                interactionLayer.appendChild(line);
                currentLineElement = line;
                isPointerDown = true;
            }

            // تحديث الخط أثناء السحب
            function updateLine(clientX, clientY) {
                if (!isPointerDown || !currentLineElement) return;

                const rect = container.getBoundingClientRect();
                const currentX = clientX - rect.left;
                const currentY = clientY - rect.top;

                const dx = currentX - lineStartX;
                const dy = currentY - lineStartY;
                const distance = Math.sqrt(dx*dx + dy*dy);
                if (distance < 3) return;

                const angle = Math.atan2(dy, dx) * (180 / Math.PI);

                currentLineElement.style.width = distance + 'px';
                currentLineElement.style.transform = `rotate(${angle}deg)`;
                currentLineElement.style.left = lineStartX + 'px';
                currentLineElement.style.top = lineStartY + 'px';

                lastX = currentX;
                lastY = currentY;
            }

            // إنهاء الخط الحالي (يُترك ليختفي بعد فترة قصيرة)
            function endLine() {
                if (currentLineElement) {
                    currentLineElement.style.transition = 'opacity 0.3s';
                    currentLineElement.style.opacity = '0.6';
                    setTimeout(() => {
                        if (currentLineElement && currentLineElement.parentNode) {
                            currentLineElement.remove();
                        }
                    }, 350);
                    currentLineElement = null;
                }
                isPointerDown = false;
            }

            // ========== معالجة الأحداث (الفأرة واللمس) ==========

            // === أحداث الفأرة ===
            function onMouseDown(e) {
                e.preventDefault();
                const clientX = e.clientX;
                const clientY = e.clientY;

                createCircle(clientX, clientY);
                startLine(clientX, clientY);

                if (hint) hint.style.opacity = '0';
            }

            function onMouseMove(e) {
                e.preventDefault();
                if (isPointerDown) {
                    updateLine(e.clientX, e.clientY);
                }
            }

            function onMouseUp(e) {
                e.preventDefault();
                if (isPointerDown) {
                    endLine();
                }
                isPointerDown = false;
            }

            // === أحداث اللمس ===
            function onTouchStart(e) {
                e.preventDefault();
                const touch = e.touches[0];
                if (!touch) return;
                const clientX = touch.clientX;
                const clientY = touch.clientY;

                createCircle(clientX, clientY);
                startLine(clientX, clientY);

                if (hint) hint.style.opacity = '0';
            }

            function onTouchMove(e) {
                e.preventDefault();
                const touch = e.touches[0];
                if (!touch) return;
                if (isPointerDown) {
                    updateLine(touch.clientX, touch.clientY);
                }
            }

            function onTouchEnd(e) {
                e.preventDefault();
                if (isPointerDown) {
                    endLine();
                }
                isPointerDown = false;
            }

            // === ربط الأحداث بالـ canvas ===
            canvas.addEventListener('mousedown', onMouseDown);
            canvas.addEventListener('mousemove', onMouseMove);
            canvas.addEventListener('mouseup', onMouseUp);
            canvas.addEventListener('mouseleave', (e) => {
                if (isPointerDown) {
                    endLine();
                }
                isPointerDown = false;
            });

            canvas.addEventListener('touchstart', onTouchStart, { passive: false });
            canvas.addEventListener('touchmove', onTouchMove, { passive: false });
            canvas.addEventListener('touchend', onTouchEnd, { passive: false });
            canvas.addEventListener('touchcancel', (e) => {
                e.preventDefault();
                if (isPointerDown) {
                    endLine();
                }
                isPointerDown = false;
            });

            canvas.addEventListener('contextmenu', (e) => e.preventDefault());
            document.addEventListener('dragstart', (e) => e.preventDefault());

            window.addEventListener('blur', () => {
                if (isPointerDown) {
                    endLine();
                }
                isPointerDown = false;
            });

            window.addEventListener('resize', () => {
                resizeCanvas();
                ctx.fillStyle = '#0b0b0b';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            });

            // اختفاء الرسالة بعد 4 ثواني تلقائياً
            setTimeout(() => {
                if (hint) hint.style.opacity = '0.4';
                setTimeout(() => {
                    if (hint) hint.style.opacity = '0';
                }, 2000);
            }, 4000);

            console.log('✅ الشاشة التفاعلية جاهزة - الخطوط القديمة تختفي تلقائياً عند بدء خط جديد');
        })();
    </script>
</body>
</html>
